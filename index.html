<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BNI Manager</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  .tab-active { border-bottom: 2px solid #2563eb; color: #2563eb; font-weight:600; }
  .tab-btn { padding: 8px 14px; font-size:14px; cursor:pointer; color:#6b7280; white-space:nowrap; }
  .tab-btn:hover { color:#2563eb; }
  textarea { resize: vertical; }
  .contact-item:hover { background:#f0f4ff; }
  .contact-item.active { background:#dbeafe; }
  #sidebar { min-width:280px; max-width:280px; }
  @media(max-width:768px){ #sidebar{ min-width:100%; max-width:100%; } #detail{ display:none; } #sidebar.hidden-mobile{ display:none; } #detail.show-mobile{ display:block !important; } }
</style>
</head>
<body class="bg-gray-50 h-screen flex flex-col">

<!-- Header -->
<header class="bg-blue-600 text-white px-4 py-3 flex items-center justify-between shadow">
  <div class="flex items-center gap-3">
    <button id="backBtn" class="md:hidden text-white text-xl hidden" onclick="showList()">←</button>
    <h1 class="font-bold text-lg">BNI Manager</h1>
  </div>
  <div class="flex gap-2">
    <button onclick="openImportModal()" class="bg-blue-500 hover:bg-blue-400 text-white font-semibold text-sm px-3 py-1.5 rounded-lg">📥 取込</button>
    <button onclick="openAddModal()" class="bg-white text-blue-600 font-semibold text-sm px-3 py-1.5 rounded-lg">+ 追加</button>
  </div>
</header>

<div class="flex flex-1 overflow-hidden">

  <!-- Sidebar: Contact List -->
  <div id="sidebar" class="bg-white border-r flex flex-col overflow-hidden">
    <div class="p-3 border-b">
      <input id="searchInput" type="text" placeholder="名前・会社名・カテゴリーで検索..." class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400" oninput="onSearch(this.value)">
    </div>
    <div id="contactList" class="flex-1 overflow-y-auto"></div>
  </div>

  <!-- Detail Panel -->
  <div id="detail" class="flex-1 overflow-y-auto bg-white hidden md:block">
    <div id="emptyState" class="flex items-center justify-center h-full text-gray-400 text-sm">
      左のリストから人物を選択してください
    </div>
    <div id="contactDetail" class="hidden"></div>
  </div>

</div>

<!-- Import Modal -->
<div id="importModal" class="fixed inset-0 bg-black bg-opacity-40 hidden z-50 overflow-y-auto">
  <div class="bg-white max-w-xl mx-auto my-10 rounded-xl shadow-xl overflow-hidden">
    <div class="bg-blue-600 text-white px-6 py-4 flex items-center justify-between">
      <h2 class="font-bold text-lg">📥 ファイルから取込</h2>
      <button onclick="closeImportModal()" class="text-white text-2xl leading-none">&times;</button>
    </div>
    <div class="p-6 space-y-5">

      <!-- Tab: File / URL -->
      <div class="flex border-b">
        <button id="importTabFile" onclick="switchImportTab('file')" class="tab-btn tab-active">ファイルアップロード</button>
        <button id="importTabUrl" onclick="switchImportTab('url')" class="tab-btn">Google Docs URL</button>
      </div>

      <!-- File upload area -->
      <div id="importFileArea">
        <label class="block border-2 border-dashed border-gray-300 rounded-xl p-8 text-center cursor-pointer hover:border-blue-400 transition" id="dropZone">
          <div class="text-4xl mb-2">📄</div>
          <div class="text-sm font-medium text-gray-700">PDF・Word・TXTをここにドロップ</div>
          <div class="text-xs text-gray-400 mt-1">またはクリックして選択</div>
          <input type="file" id="importFile" accept=".pdf,.docx,.doc,.txt" class="hidden" onchange="onFileSelect(this)">
        </label>
        <div id="selectedFileName" class="text-sm text-blue-600 mt-2 hidden"></div>
      </div>

      <!-- URL input area -->
      <div id="importUrlArea" class="hidden">
        <label class="text-sm font-medium text-gray-700">Google Docs / Sheets の URL</label>
        <input id="importUrl" type="text" placeholder="https://docs.google.com/document/d/..." class="mt-1 w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
        <div class="text-xs text-gray-400 mt-1">※「リンクを知っている全員が閲覧可能」に設定されている必要があります</div>
      </div>

      <!-- Result preview -->
      <div id="importPreview" class="hidden">
        <div class="flex items-center gap-2 mb-3">
          <span class="text-sm font-bold text-gray-700">✅ 解析結果</span>
          <span class="text-xs text-gray-400">内容を確認して「この内容で登録」を押してください</span>
        </div>
        <div id="importPreviewContent" class="border rounded-lg p-3 bg-gray-50 text-sm space-y-1 max-h-64 overflow-y-auto"></div>
      </div>

      <div id="importError" class="hidden text-sm text-red-600 bg-red-50 rounded-lg p-3"></div>
    </div>

    <div class="px-6 py-4 bg-gray-50 flex justify-between items-center">
      <button onclick="closeImportModal()" class="px-4 py-2 text-sm text-gray-600 border rounded-lg hover:bg-gray-100">キャンセル</button>
      <div class="flex gap-2">
        <button id="importParseBtn" onclick="runImport()" class="px-4 py-2 text-sm bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-semibold">🔍 解析</button>
        <button id="importSaveBtn" onclick="saveImported()" class="hidden px-4 py-2 text-sm bg-green-600 text-white rounded-lg hover:bg-green-700 font-semibold">✅ この内容で登録</button>
      </div>
    </div>
  </div>
</div>

<!-- Add/Edit Modal -->
<div id="modal" class="fixed inset-0 bg-black bg-opacity-40 hidden z-50 overflow-y-auto">
  <div class="bg-white max-w-2xl mx-auto my-6 rounded-xl shadow-xl overflow-hidden">
    <div class="bg-blue-600 text-white px-6 py-4 flex items-center justify-between">
      <h2 id="modalTitle" class="font-bold text-lg">人物を追加</h2>
      <button onclick="closeModal()" class="text-white text-2xl leading-none">&times;</button>
    </div>
    <div class="p-6 space-y-4 max-h-[75vh] overflow-y-auto">
      <input type="hidden" id="editId">

      <div class="grid grid-cols-2 gap-3">
        <div class="col-span-2">
          <label class="text-sm font-medium text-gray-700">名前 *</label>
          <input id="f_name" type="text" class="mt-1 w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
        </div>
        <div>
          <label class="text-sm font-medium text-gray-700">よみがな</label>
          <input id="f_reading" type="text" class="mt-1 w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
        </div>
        <div>
          <label class="text-sm font-medium text-gray-700">最終1on1日</label>
          <input id="f_last_meeting_date" type="date" class="mt-1 w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
        </div>
        <div>
          <label class="text-sm font-medium text-gray-700">会社名</label>
          <input id="f_company" type="text" class="mt-1 w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
        </div>
        <div>
          <label class="text-sm font-medium text-gray-700">チャプター名</label>
          <input id="f_chapter" type="text" class="mt-1 w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
        </div>
        <div class="col-span-2">
          <label class="text-sm font-medium text-gray-700">カテゴリー（職種）</label>
          <input id="f_category" type="text" class="mt-1 w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
        </div>
      </div>

      <hr>
      <p class="text-xs font-bold text-gray-500 uppercase tracking-wide">略歴</p>
      <div class="space-y-3">
        <div>
          <label class="text-sm font-medium text-gray-700">事業内容</label>
          <textarea id="f_business_description" rows="3" class="mt-1 w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"></textarea>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div><label class="text-sm font-medium text-gray-700">活動地域</label><input id="f_area" type="text" class="mt-1 w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"></div>
          <div><label class="text-sm font-medium text-gray-700">出身地</label><input id="f_birthplace" type="text" class="mt-1 w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"></div>
          <div><label class="text-sm font-medium text-gray-700">居住地</label><input id="f_residence" type="text" class="mt-1 w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"></div>
          <div><label class="text-sm font-medium text-gray-700">経験年数</label><input id="f_experience_years" type="text" class="mt-1 w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"></div>
          <div><label class="text-sm font-medium text-gray-700">配偶者</label><input id="f_spouse" type="text" class="mt-1 w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"></div>
          <div><label class="text-sm font-medium text-gray-700">家族構成</label><input id="f_family" type="text" class="mt-1 w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"></div>
        </div>
        <div><label class="text-sm font-medium text-gray-700">前職</label><input id="f_previous_jobs" type="text" class="mt-1 w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"></div>
        <div><label class="text-sm font-medium text-gray-700">趣味</label><input id="f_hobbies" type="text" class="mt-1 w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"></div>
      </div>

      <hr>
      <p class="text-xs font-bold text-gray-500 uppercase tracking-wide">Power 1-2-1</p>
      <div class="space-y-3">
        <div><label class="text-sm font-medium text-gray-700">独自のセールスポイント</label><textarea id="f_selling_points" rows="3" class="mt-1 w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"></textarea></div>
        <div><label class="text-sm font-medium text-gray-700">ターゲット顧客</label><textarea id="f_target_customers" rows="3" class="mt-1 w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"></textarea></div>
        <div><label class="text-sm font-medium text-gray-700">成功の鍵</label><textarea id="f_success_key" rows="2" class="mt-1 w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"></textarea></div>
        <div><label class="text-sm font-medium text-gray-700">紹介の切り出し方</label><textarea id="f_referral_intro" rows="3" class="mt-1 w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"></textarea></div>
        <div><label class="text-sm font-medium text-gray-700">お願いしたいこと</label><textarea id="f_request" rows="2" class="mt-1 w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"></textarea></div>
      </div>

      <hr>
      <p class="text-xs font-bold text-gray-500 uppercase tracking-wide">GAINS</p>
      <div class="space-y-3">
        <div><label class="text-sm font-medium text-gray-700">目標 (Goals)</label><textarea id="f_goals" rows="2" class="mt-1 w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"></textarea></div>
        <div><label class="text-sm font-medium text-gray-700">実績 (Accomplishments)</label><textarea id="f_accomplishments" rows="2" class="mt-1 w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"></textarea></div>
        <div><label class="text-sm font-medium text-gray-700">興味関心 (Interests)</label><textarea id="f_interests" rows="2" class="mt-1 w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"></textarea></div>
        <div><label class="text-sm font-medium text-gray-700">人脈 (Networks)</label><textarea id="f_networks" rows="2" class="mt-1 w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"></textarea></div>
        <div><label class="text-sm font-medium text-gray-700">スキル (Skills)</label><textarea id="f_skills" rows="2" class="mt-1 w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"></textarea></div>
      </div>
    </div>
    <div class="px-6 py-4 bg-gray-50 flex justify-end gap-3">
      <button onclick="closeModal()" class="px-4 py-2 text-sm text-gray-600 border rounded-lg hover:bg-gray-100">キャンセル</button>
      <button onclick="saveContact()" class="px-4 py-2 text-sm bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-semibold">保存</button>
    </div>
  </div>
</div>

<script>
let contacts = [];
let currentId = null;

const FIELDS = ['name','reading','company','chapter','category','last_meeting_date',
  'business_description','area','birthplace','residence','spouse','family','previous_jobs',
  'hobbies','experience_years','success_key','selling_points','target_customers','referral_intro',
  'request','goals','accomplishments','interests','networks','skills','introduction'];

const BASE = (() => {
  const p = window.location.pathname;
  return p.endsWith('/') ? p : p.substring(0, p.lastIndexOf('/') + 1);
})();

async function api(method, path, body) {
  const opts = { method, headers: {'Content-Type':'application/json'} };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(BASE + 'api' + path, opts);
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

async function loadContacts(q='') {
  contacts = await api('GET', '/contacts' + (q ? '?q='+encodeURIComponent(q) : ''));
  renderList();
}

function renderList() {
  const el = document.getElementById('contactList');
  if (!contacts.length) {
    el.innerHTML = '<div class="p-4 text-sm text-gray-400 text-center">登録がありません</div>';
    return;
  }
  el.innerHTML = contacts.map(c => `
    <div class="contact-item px-4 py-3 border-b cursor-pointer ${c.id===currentId?'active':''}" onclick="selectContact(${c.id})">
      <div class="font-medium text-sm text-gray-900">${esc(c.name)} ${c.category?`<span class="text-xs text-gray-500">(${esc(c.category)})</span>`:''}</div>
      <div class="text-xs text-gray-500 mt-0.5">${esc(c.chapter||'')} ${c.company?'/ '+esc(c.company):''}</div>
      ${c.last_meeting_date?`<div class="text-xs text-gray-400 mt-0.5">最終: ${c.last_meeting_date}</div>`:''}
    </div>`).join('');
}

async function selectContact(id) {
  currentId = id;
  renderList();
  const c = await api('GET', '/contacts/'+id);
  const memos = await api('GET', '/contacts/'+id+'/memos');
  const reminders = await api('GET', '/contacts/'+id+'/reminders');
  renderDetail(c, memos, reminders);
  document.getElementById('emptyState').classList.add('hidden');
  document.getElementById('contactDetail').classList.remove('hidden');
  // Mobile
  document.getElementById('sidebar').classList.add('hidden-mobile');
  document.getElementById('detail').classList.add('show-mobile');
  document.getElementById('backBtn').classList.remove('hidden');
}

function showList() {
  document.getElementById('sidebar').classList.remove('hidden-mobile');
  document.getElementById('detail').classList.remove('show-mobile');
  document.getElementById('backBtn').classList.add('hidden');
}

function renderDetail(c, memos, reminders) {
  const el = document.getElementById('contactDetail');
  el.innerHTML = `
    <div class="p-4 border-b flex items-start justify-between">
      <div>
        <h2 class="text-xl font-bold text-gray-900">${esc(c.name)}</h2>
        <div class="text-sm text-gray-500 mt-0.5">${esc(c.category||'')}${c.company?' — '+esc(c.company):''}</div>
        ${c.chapter?`<div class="text-xs text-gray-400 mt-0.5">${esc(c.chapter)}</div>`:''}
      </div>
      <div class="flex gap-2">
        <button onclick="openEditModal(${c.id})" class="text-sm bg-gray-100 hover:bg-gray-200 text-gray-700 px-3 py-1.5 rounded-lg">編集</button>
        <button onclick="confirmDelete(${c.id})" class="text-sm bg-red-50 hover:bg-red-100 text-red-600 px-3 py-1.5 rounded-lg">削除</button>
      </div>
    </div>

    <!-- Tabs -->
    <div class="border-b overflow-x-auto">
      <div class="flex" id="tabs">
        ${['略歴','Power 1-2-1','GAINS','メモ','リマインダー','紹介文'].map((t,i)=>
          `<button class="tab-btn${i===0?' tab-active':''}" onclick="showTab(${i})">${t}</button>`
        ).join('')}
      </div>
    </div>

    <div id="tabContent" class="p-4">
      ${renderTabContent(c, memos, reminders, 0)}
    </div>
  `;
}

function showTab(idx) {
  document.querySelectorAll('.tab-btn').forEach((b,i)=>{
    b.classList.toggle('tab-active', i===idx);
  });
  const c = contacts.find(x=>x.id===currentId) || {};
  // Re-fetch full data
  Promise.all([
    api('GET','/contacts/'+currentId),
    api('GET','/contacts/'+currentId+'/memos'),
    api('GET','/contacts/'+currentId+'/reminders')
  ]).then(([contact, memos, reminders])=>{
    document.getElementById('tabContent').innerHTML = renderTabContent(contact, memos, reminders, idx);
  });
}

function renderTabContent(c, memos, reminders, tab) {
  if (tab===0) return renderBiography(c);
  if (tab===1) return renderPower121(c);
  if (tab===2) return renderGains(c);
  if (tab===3) return renderMemos(memos, c.id);
  if (tab===4) return renderReminders(reminders, c.id);
  if (tab===5) return renderIntroduction(c);
  return '';
}

function field(label, val) {
  if (!val) return '';
  return `<div class="mb-3"><div class="text-xs font-semibold text-gray-500 mb-1">${label}</div><div class="text-sm text-gray-800 whitespace-pre-wrap">${esc(val)}</div></div>`;
}

function renderBiography(c) {
  const items = [
    ['事業内容', c.business_description],
    ['活動地域', c.area],
    ['出身地', c.birthplace],
    ['居住地', c.residence],
    ['配偶者', c.spouse],
    ['家族構成', c.family],
    ['前職', c.previous_jobs],
    ['趣味', c.hobbies],
    ['経験年数', c.experience_years],
  ];
  const html = items.map(([l,v])=>field(l,v)).join('');
  return html || '<div class="text-sm text-gray-400">データがありません</div>';
}

function renderPower121(c) {
  const items = [
    ['独自のセールスポイント', c.selling_points],
    ['ターゲット顧客', c.target_customers],
    ['成功の鍵', c.success_key],
    ['紹介の切り出し方', c.referral_intro],
    ['お願いしたいこと', c.request],
  ];
  const html = items.map(([l,v])=>field(l,v)).join('');
  return html || '<div class="text-sm text-gray-400">データがありません</div>';
}

function renderGains(c) {
  const items = [
    ['目標 (Goals)', c.goals],
    ['実績 (Accomplishments)', c.accomplishments],
    ['興味関心 (Interests)', c.interests],
    ['人脈 (Networks)', c.networks],
    ['スキル (Skills)', c.skills],
  ];
  const html = items.map(([l,v])=>field(l,v)).join('');
  return html || '<div class="text-sm text-gray-400">データがありません</div>';
}

function renderMemos(memos, cid) {
  return `
    <div class="mb-4">
      <div class="flex gap-2">
        <textarea id="newMemo" rows="2" placeholder="メモを入力..." class="flex-1 border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"></textarea>
        <button onclick="addMemo(${cid})" class="bg-blue-600 text-white text-sm px-3 py-2 rounded-lg hover:bg-blue-700 whitespace-nowrap">追加</button>
      </div>
    </div>
    <div id="memoList">
      ${memos.length ? memos.map(m=>`
        <div class="border rounded-lg p-3 mb-2 bg-gray-50 flex items-start gap-2">
          <div class="flex-1">
            <div class="text-sm text-gray-800 whitespace-pre-wrap">${esc(m.content)}</div>
            <div class="text-xs text-gray-400 mt-1">${m.created_at}</div>
          </div>
          <button onclick="deleteMemo(${m.id},${cid})" class="text-red-400 hover:text-red-600 text-lg leading-none">&times;</button>
        </div>`).join('')
      : '<div class="text-sm text-gray-400">メモがありません</div>'}
    </div>`;
}

function renderReminders(reminders, cid) {
  return `
    <div class="mb-4">
      <div class="flex gap-2 flex-wrap">
        <input type="date" id="newReminderDate" class="border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
        <input type="text" id="newReminderMsg" placeholder="メモ（任意）" class="flex-1 min-w-0 border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
        <button onclick="addReminder(${cid})" class="bg-blue-600 text-white text-sm px-3 py-2 rounded-lg hover:bg-blue-700 whitespace-nowrap">追加</button>
      </div>
    </div>
    <div id="reminderList">
      ${reminders.length ? reminders.map(r=>`
        <div class="border rounded-lg p-3 mb-2 flex items-center gap-2 ${r.done?'bg-gray-100 opacity-60':'bg-gray-50'}">
          <input type="checkbox" ${r.done?'checked':''} onchange="toggleReminder(${r.id},${cid})" class="w-4 h-4 accent-blue-600">
          <div class="flex-1">
            <div class="text-sm font-medium text-gray-800">${esc(r.remind_date)}</div>
            ${r.message?`<div class="text-xs text-gray-500">${esc(r.message)}</div>`:''}
          </div>
          <button onclick="deleteReminder(${r.id},${cid})" class="text-red-400 hover:text-red-600 text-lg leading-none">&times;</button>
        </div>`).join('')
      : '<div class="text-sm text-gray-400">リマインダーがありません</div>'}
    </div>`;
}

function renderIntroduction(c) {
  return `
    <div class="mb-3">
      <div class="flex items-center justify-between mb-2">
        <span class="text-xs font-semibold text-gray-500">紹介文</span>
        <button onclick="generateIntro(${c.id})" id="genBtn" class="text-xs bg-blue-600 text-white px-3 py-1.5 rounded-lg hover:bg-blue-700 flex items-center gap-1">
          ✨ AIで自動生成
        </button>
      </div>
      <textarea id="introText" rows="8" class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">${esc(c.introduction||'')}</textarea>
      <button onclick="saveIntro(${c.id})" class="mt-2 text-sm bg-gray-800 text-white px-4 py-1.5 rounded-lg hover:bg-gray-700">保存</button>
    </div>`;
}

async function addMemo(cid) {
  const content = document.getElementById('newMemo').value.trim();
  if (!content) return;
  await api('POST', '/contacts/'+cid+'/memos', {content});
  showTab(3);
}

async function deleteMemo(mid, cid) {
  if (!confirm('削除しますか？')) return;
  await api('DELETE', '/memos/'+mid);
  showTab(3);
}

async function addReminder(cid) {
  const remind_date = document.getElementById('newReminderDate').value;
  const message = document.getElementById('newReminderMsg').value.trim();
  if (!remind_date) return alert('日付を選択してください');
  await api('POST', '/contacts/'+cid+'/reminders', {remind_date, message});
  showTab(4);
}

async function toggleReminder(rid, cid) {
  await api('PUT', '/reminders/'+rid+'/toggle');
  showTab(4);
}

async function deleteReminder(rid, cid) {
  if (!confirm('削除しますか？')) return;
  await api('DELETE', '/reminders/'+rid);
  showTab(4);
}

async function generateIntro(cid) {
  const btn = document.getElementById('genBtn');
  btn.textContent = '生成中...';
  btn.disabled = true;
  try {
    const res = await api('POST', '/contacts/'+cid+'/generate-introduction');
    document.getElementById('introText').value = res.introduction;
  } catch(e) {
    alert('生成に失敗しました: ' + e.message);
  } finally {
    btn.innerHTML = '✨ AIで自動生成';
    btn.disabled = false;
  }
}

async function saveIntro(cid) {
  const introduction = document.getElementById('introText').value;
  const c = await api('GET', '/contacts/'+cid);
  await api('PUT', '/contacts/'+cid, {...c, introduction});
  // Update local cache
  const idx = contacts.findIndex(x=>x.id===cid);
  if (idx>=0) contacts[idx].introduction = introduction;
}

function openAddModal() {
  document.getElementById('modalTitle').textContent = '人物を追加';
  document.getElementById('editId').value = '';
  FIELDS.forEach(f => {
    const el = document.getElementById('f_'+f);
    if (el) el.value = '';
  });
  document.getElementById('modal').classList.remove('hidden');
}

async function openEditModal(id) {
  const c = await api('GET', '/contacts/'+id);
  document.getElementById('modalTitle').textContent = '編集: ' + c.name;
  document.getElementById('editId').value = id;
  FIELDS.forEach(f => {
    const el = document.getElementById('f_'+f);
    if (el) el.value = c[f] || '';
  });
  document.getElementById('modal').classList.remove('hidden');
}

function closeModal() {
  document.getElementById('modal').classList.add('hidden');
}

async function saveContact() {
  const id = document.getElementById('editId').value;
  const data = {};
  FIELDS.forEach(f => {
    const el = document.getElementById('f_'+f);
    if (el) data[f] = el.value;
  });
  if (!data.name.trim()) return alert('名前は必須です');
  if (id) {
    await api('PUT', '/contacts/'+id, data);
  } else {
    await api('POST', '/contacts', data);
  }
  closeModal();
  await loadContacts(document.getElementById('searchInput').value);
  if (id) selectContact(parseInt(id));
}

async function confirmDelete(id) {
  if (!confirm('削除しますか？この操作は元に戻せません。')) return;
  await api('DELETE', '/contacts/'+id);
  currentId = null;
  document.getElementById('contactDetail').classList.add('hidden');
  document.getElementById('emptyState').classList.remove('hidden');
  await loadContacts(document.getElementById('searchInput').value);
}

let searchTimer;
function onSearch(q) {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(()=>loadContacts(q), 300);
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Import ──────────────────────────────────────────────
let importedData = null;
let currentImportTab = 'file';

function openImportModal() {
  importedData = null;
  document.getElementById('importModal').classList.remove('hidden');
  document.getElementById('importPreview').classList.add('hidden');
  document.getElementById('importError').classList.add('hidden');
  document.getElementById('importSaveBtn').classList.add('hidden');
  document.getElementById('importParseBtn').classList.remove('hidden');
  document.getElementById('importFile').value = '';
  document.getElementById('importUrl').value = '';
  document.getElementById('selectedFileName').classList.add('hidden');
  switchImportTab('file');
}

function closeImportModal() {
  document.getElementById('importModal').classList.add('hidden');
}

function switchImportTab(tab) {
  currentImportTab = tab;
  document.getElementById('importFileArea').classList.toggle('hidden', tab !== 'file');
  document.getElementById('importUrlArea').classList.toggle('hidden', tab !== 'url');
  document.getElementById('importTabFile').classList.toggle('tab-active', tab === 'file');
  document.getElementById('importTabUrl').classList.toggle('tab-active', tab === 'url');
}

function onFileSelect(input) {
  const file = input.files[0];
  if (file) {
    const el = document.getElementById('selectedFileName');
    el.textContent = '📎 ' + file.name;
    el.classList.remove('hidden');
  }
}

// ドロップゾーン
document.addEventListener('DOMContentLoaded', () => {
  const zone = document.getElementById('dropZone');
  if (!zone) return;
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('border-blue-500','bg-blue-50'); });
  zone.addEventListener('dragleave', () => { zone.classList.remove('border-blue-500','bg-blue-50'); });
  zone.addEventListener('drop', e => {
    e.preventDefault();
    zone.classList.remove('border-blue-500','bg-blue-50');
    const file = e.dataTransfer.files[0];
    if (file) {
      document.getElementById('importFile').files = e.dataTransfer.files;
      onFileSelect(document.getElementById('importFile'));
    }
  });
  zone.addEventListener('click', () => document.getElementById('importFile').click());
});

async function runImport() {
  const btn = document.getElementById('importParseBtn');
  btn.textContent = '解析中...';
  btn.disabled = true;
  document.getElementById('importError').classList.add('hidden');
  document.getElementById('importPreview').classList.add('hidden');

  try {
    let res;
    if (currentImportTab === 'file') {
      const file = document.getElementById('importFile').files[0];
      if (!file) { alert('ファイルを選択してください'); return; }
      const fd = new FormData();
      fd.append('file', file);
      const r = await fetch(BASE + 'api/import/file', { method: 'POST', body: fd });
      if (!r.ok) {
        let msg = r.statusText;
        try { msg = (await r.json()).detail || msg; } catch {}
        throw new Error(msg);
      }
      res = await r.json();
    } else {
      const url = document.getElementById('importUrl').value.trim();
      if (!url) { alert('URLを入力してください'); return; }
      const fd = new FormData();
      fd.append('url', url);
      const r = await fetch(BASE + 'api/import/url', { method: 'POST', body: fd });
      if (!r.ok) {
        let msg = r.statusText;
        try { msg = (await r.json()).detail || msg; } catch {}
        throw new Error(msg);
      }
      res = await r.json();
    }

    importedData = res.parsed;
    renderImportPreview(res.parsed, res.raw_text);
    document.getElementById('importPreview').classList.remove('hidden');
    document.getElementById('importSaveBtn').classList.remove('hidden');
  } catch(e) {
    const el = document.getElementById('importError');
    el.textContent = '❌ ' + e.message;
    el.classList.remove('hidden');
  } finally {
    btn.textContent = '🔍 解析';
    btn.disabled = false;
  }
}

const FIELD_LABELS = {
  name:'名前', reading:'よみがな', company:'会社名', chapter:'チャプター', category:'職種',
  business_description:'事業内容', area:'活動地域', birthplace:'出身地', residence:'居住地',
  spouse:'配偶者', family:'家族構成', previous_jobs:'前職', hobbies:'趣味', experience_years:'経験年数',
  success_key:'成功の鍵', selling_points:'セールスポイント', target_customers:'ターゲット顧客',
  referral_intro:'紹介の切り出し方', request:'お願いしたいこと',
  goals:'目標', accomplishments:'実績', interests:'興味関心', networks:'人脈', skills:'スキル'
};

function renderImportPreview(data, rawText) {
  const el = document.getElementById('importPreviewContent');
  const rows = Object.entries(FIELD_LABELS)
    .filter(([k]) => data[k])
    .map(([k,label]) => `<div class="flex gap-2 py-0.5"><span class="text-gray-500 w-28 shrink-0 text-xs">${label}</span><span class="text-gray-800 text-xs">${esc(String(data[k]).substring(0,120))}${String(data[k]).length>120?'…':''}</span></div>`);
  const rawSection = rawText ? `<details class="mt-3"><summary class="text-xs text-gray-400 cursor-pointer">▶ 抽出テキスト（先頭）</summary><pre class="text-xs text-gray-500 mt-1 whitespace-pre-wrap bg-white p-2 rounded border">${esc(rawText)}</pre></details>` : '';
  el.innerHTML = (rows.length ? rows.join('') : '<div class="text-gray-400 text-sm">取得できたデータがありません</div>') + rawSection;
}

async function saveImported() {
  if (!importedData) return;
  // FIELDS にないキーを除去し、name がなければ警告
  if (!importedData.name) {
    const n = prompt('名前が取得できませんでした。名前を入力してください:');
    if (!n) return;
    importedData.name = n;
  }
  const data = {};
  FIELDS.forEach(f => { data[f] = importedData[f] || ''; });
  await api('POST', '/contacts', data);
  closeImportModal();
  await loadContacts();
  // 追加した人を選択
  if (contacts.length) selectContact(contacts[0].id);
}

// Init
loadContacts();
